<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us - Xyrenne Store</title>
    <link rel="stylesheet" href="styles/styles.css" />
  </head>
  <body>
    <div class="window-container">
      <div class="window-header">
        <span class="window-title">Contact us page</span>
        <div class="group-circle">
          <span class="point"></span>
          <span class="point"></span>
          <span class="point"></span>
        </div>
      </div>
      <main>
        <header>
          <div class="logo-circle">site logo</div>
          <h1>Xyrenne Store</h1>
        </header>

        <div class="container">
          <nav class="sidebar">
            <a href="index.html" class="nav-button">Home</a>
            <a href="contact.html" class="nav-button active-page">Contact us</a>
          </nav>

          <div class="content">
            <form action="#" method="post" class="contact-form">
              <div class="form-row">
                <label for="name">Your name:</label>
                <input type="text" id="name" name="name" />
              </div>

              <div class="form-row">
                <label for="email">Your email:</label>
                <input type="email" id="email" name="email" />
              </div>

              <div class="form-row">
                <label for="message">Your message:</label>
                <input type="message" id="message" name="message" />
              </div>

              <div class="submit-btn">
                <button type="submit" class="send-btn">Submit</button>
              </div>
            </form>
          </div>
        </div>
      </main>
      <footer>
        <p>Created by Xyrenne</p>
        <p>Follow us on <a href="#">[social media]</a></p>
      </footer>
    </div>
  </body>
</html>
