<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us - Xyrenne Store</title>
    <link rel="stylesheet" href="styles/styles.css" />
  </head>
  <body>
    <header>
      <div class="header-logo">
        <img src="images/logo.png" alt="Logo" class="logo-circle" />
        <h1>Xyrenne Store</h1>
      </div>

      <nav class="container">
        <a href="index.html" class="nav-button ">Home</a>
        <a href="contact.html" class="nav-button active-page">Contact us</a>
      </nav>
    </header>

<main class="content-section">
<form class="contact-form">
<label for="name">Your name:</label>
<input type="text" id="name" name="name" />

<label for="email">Your email:</label>
<input type="email" id="email" name="email" />

<label for="message">Your message:</label>
<textarea id="message" name="message" rows="5" cols="5"></textarea>

<button type="submit">Submit</button>
</form>
</main>

<footer>
<p>Created by Xyrenne</p>
<p>Follow us on <a href="#">[social media]</a></p>
</footer>
</div>
</body>
</html>
