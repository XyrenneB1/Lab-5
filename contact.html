<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us - Xyrenne Store</title>
    <link rel="stylesheet" href="styles/styles.css" />
  </head>
  <body>
    <div class="window-container">
      <div class="window-header">
        <span class="window-title">Contact us page</span>
        <div class="group-circle">
          <span class="point"></span>
          <span class="point"></span>
          <span class="point"></span>
        </div>
      </div>

      <header>
        <div class="logo-circle">site logo</div>
        <h1>Xyrenne Store</h1>
      </header>

      <div class="container">
        <nav class="sidebar">
          <a href="index.html" class="nav-button">Home</a>
          <a href="contact.html" class="nav-button active-page">Contact us</a>
        </nav>

        <article class="content">
          <h2>Contact Us</h2>
          <form action="#" method="post" class="contact-form">
            <div class="form-row">
              <label for="name">Name:</label>
              <input
                type="text"
                id="name"
                name="name"
                placeholder="Your Name"
                required
              />
            </div>

            <div class="form-row">
              <label for="email">Email:</label>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="Your Email"
                required
              />
            </div>

            <div class="form-row">
              <label for="message">Message:</label>
              <textarea
                id="message"
                name="message"
                rows="4"
                placeholder="How can we help?"
              ></textarea>
            </div>

            <button type="submit" class="send-btn">Send Message</button>
          </form>
        </article>
      </div>

      <footer>
        <p>Created by Xyrenne</p>
        <p>Follow us on <a href="#">[social media]</a></p>
      </footer>
    </div>
  </body>
</html>
